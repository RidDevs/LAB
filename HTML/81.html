<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARIABLE FONT SIZE</title>
    <style>
         
        body {
            font-size: 24px;
            font-family: Arial;
        }

        h1 {
            font-size: 2rem;
        }

        @media (max-width: 800px) {
            body {
                font-size: 18px;
            }
        }
        @media (max-width: 500px) {
            body {
                font-size: 10px;
            }
        }

    </style>
</head>
<body>
    <h1>VARIABLE FONT SIZE</h1>
    <p>DIFFERENT SIZES OF FONT IN DIFFERENT SCREEN SIZE </p>
</body>
</html>
