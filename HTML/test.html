<body>
    <button onclick="check()"></button>
    <p id="output"></p>
<script>
    let a=parseInt(prompt("enter to check prime"))
    let isprime=true;
    for(let x=2; x<Math.sqrt(a);x++)
    {if (a%x==0)
    {isprime=false;break;}
  }
  if (isprime==false)
{alert("not prime");}
 else{alert("prime")}
</script>
