<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
</head>
<body>

<div class="container">
    <h3>Calculator</h3>
    <input type="number" id="num1">Number1<br>
    <input type="number" id="num2">Number2<br>
    <input type="text" id="result" readonly>Result<br><br>
OPERATIONS<br>
    <button onclick="calc('*')">x</button>
    <button onclick="calc('+')">+</button>
    <button onclick="calc('/')">/</button>
    <button onclick="calc('-')">-</button><br>
    <button onclick="clr()">clr</button>
</div>

<script>
function calc(op) {
    let a = parseFloat(document.getElementById("num1").value);
    let b = parseFloat(document.getElementById("num2").value);
    let res;

    if (isNaN(a) || isNaN(b)) {
        alert("Enter valid numbers");
        return;
    }

    switch(op) {
        case '+': res = a + b; break;
        case '-': res = a - b; break;
        case '*': res = a * b; break;
        case '/': res = b !== 0 ? a / b : "Error"; break;
    }

    document.getElementById("result").value = res;
}

function clr() {
    document.getElementById("num1-     ").value = "";
    document.getElementById("num2").value = "";
    document.getElementById("result").value = "";
}
</script>

</body>
</html>
