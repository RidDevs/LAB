<!DOCTYPE html>
<html>
<head>
    <title>fibonaci</title>
</head>
<body>

<button onclick="fibonacci()">generate fibonacci series(first 20 number)</button>
<p id="output"></p>

<script>
function fibonacci() {
    let n = 20;
    let a = 0, b = 1;
    let result = a + ", " + b;

    for (let i = 2; i < n; i++) {
        let next = a + b;
        result += ", " + next;
        a = b;
        b = next;
    }

    document.getElementById("output").innerText = result;
}
</script>

</body>
</html>
