<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMAGE WITH MEDIA QUERIES</title>
    <style>
        img {
            width: 600px;
        }

        @media (max-width: 768px) {
            img {
                width: 400px;
            }
        }
    
        @media (max-width: 480px) {
            img {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <h2>Image</h2>
    <img src="img.png">
</body>
</html>
