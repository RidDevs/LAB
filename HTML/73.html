<!DOCTYPE html>
<html>
<head>
  <title>z index</title>
  <style>
    .box {
      width: 150px;
      height: 50px;
      position: absolute;
      align-items: top;     
    }

    .a {
      background: rgb(165, 129, 129);
      top: 50px;
      left: 50px;
      z-index: 1;
    }

    .b {
      background: rgb(153, 153, 194);
      top: 80px;
      left: 60px;
      z-index: 2;
    }

    .c {
      background: rgb(172, 70, 30);
      top: 110px;
      left: 70px;
      z-index: 3;
    }
  </style>
</head>
<body>

  <h2>z index display</h2>

  <div class="box a">zindex 1</div>
  <div class="box b">zindex 2</div>
  <div class="box c">zindex 3</div>

</body>
</html>
