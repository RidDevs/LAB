<!DOCTYPE html>
<html>
<head>
  <title>Specify colours</title>
</head>
<body>
  <h2>color display</h2>

  <p style="color: red">color name</p>

  <p style="color: rgb(140, 204, 140);">RGB</p>

  <p style="color: rgba(62, 62, 161, 1);">RGBA</p>

  <p style="color: #298d74;">hex code</p>

  <p style="color: hsl(30, 10%, 50%);">HSL</p>

  <p style="color: hsla(20, 100%, 50%, 0.5);">HSLA</p>

</body>
</html>
