<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
        .container {
        display: grid;
        grid-template-areas:
            "header header"
            "hero main"
            "footer footer";
        grid-template-columns: 1fr 2fr;
        gap: 10px;
        }

        .header { grid-area: header; background: lightblue; }
        .hero   { grid-area: hero;   background: lightgreen; }
        .main   { grid-area: main;   background: lightcoral; }
        .footer { grid-area: footer; background: lightgray; }

        div {
        padding: 20px;
        text-align: center;
        }

        @media (max-width: 600px) {
        .container {
            grid-template-areas:
            "header"
            "hero"
            "main"
            "footer";
            grid-template-columns: 1fr;
        }
        }
        </style>
    </head>

    <body>

        <div class="container">
        <div class="header"><h1>Header</h1></div>
        <div class="hero"><h1>Hero</h1></div>
        <div class="main"><h1>Main Content</h1>
            <img src="img.png">
        </div>
        <div class="footer"><h1>Footer</h1></div>
        </div>

    </body>
</html>
