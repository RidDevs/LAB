<!DOCTYPE html>
<html>
<head>
  <title>round corner, box &textshadow</title>
  <style>
    .box {
      width:90%;
      height: 150px;
      background-color: lightblue;
      border-radius: 20px;
      box-shadow: 5px 5px 5px gray; 
      text-align: center;
      margin: 50px auto;
      text-shadow: 2px 2px 5px black; 
    }
  </style>
</head>
<body>

<div class="box">We are using inline css in the div class box, round corner and shadows(box and text) </div>

</body>
</html>
