<!DOCTYPE html>
<html>
<head>
    <title>dialog box</title>
</head>
<body>

<button onclick="showDialogs()">click for alert</button>
<button onclick="conf()">click for confirm & prompt</button>

<script>
function showDialogs() {
    alert("alert-clck other button");
    
}
function conf(){
    let result = confirm("please comfirm to proceed?");
    if (result) 
        {let name = prompt("enter name:");
        alert("Hello " + name + "!");
    } else {
        alert("You cancelled the action.");
    }}


</script>

</body>
</html>
