<!DOCTYPE html>
<html>
<head>
<title>Card Validation</title>
</head>

<body>

<form onsubmit="return validate()">
  Name: <input type="text" id="name"><br><br>
  Card Number: <input type="text" id="card"><br><br>
  Expiry Month: <input type="text" id="month"><br><br>
  Expiry Year: <input type="text" id="year"><br><br>
  
  <input type="submit" value="Submit">
</form>

<script>
function validate() {
  let name = document.getElementById("name").value;
  let card = document.getElementById("card").value;
  let month = document.getElementById("month").value;
  let year = document.getElementById("year").value;

  if (name == "") {
    alert("Name cannot be empty");
    return false;
  }

  if (card.length != 16) {
    alert("Card must be 16 digits");
    return false;
  }

  if (month < 1 || month > 12) {
    alert("Month must be 1 to 12");
    return false;
  }

  if (year.length != 2) {
    alert("Year must be 2 digits");
    return false;
  }

  alert("Valid!");
  return true;
}
</script>

</body>
</html>
