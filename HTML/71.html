<!DOCTYPE html>
<html lang="en">
<head>
  <title>css DISPLAY</title>
  <style>

    .inline {
      display: inline;
    }
    .block {
      display: block;
    }
    .inline-block {
      display: inline-block;
      width: 100px;
      height: 50px;
    }
    .none {
      display: none;
    }
  </style>
</head>
<body>

  <h1>css property display</h1>

  <h2> Inline</h2>
  <div >
    <div class="inline"> A</div>
    <div class="inline"> B</div>
    <div class="inline">C</div>
  </div>


  <h2> block</h2>
  <div >
    <div class="block">A</div>
    <div class="block">B</div>
    <div class="block">C</div>
  </div>

  <h2> Inline-Block</h2>
  <div >
    <div class="inline-block">A</div>
    <div class="inline-block">B</div>
    <div class="inline-block">C</div>
  </div>

  
  <h2>NONE, HIDDEN</h2>
  <div class="container">
    
    <div class="none">Hidden</div>
    
  </div>

</body>
</html>
