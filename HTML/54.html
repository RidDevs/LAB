<!DOCTYPE html>
<html>
<head>
  <title>combinator selectors</title>
  <link rel="stylesheet" href="style54.css">
</head>
<body>

  <div>
    <p>Descendant Selector</p>
    <section>
      <p>Descendant 1 </p>
    </section>
  </div>

<br><br><br><br>
  <div>Child Selector- 
    <span>direct child</span>
    <section>
      <span>!!not direct child</span>
    </section>
  </div>

  <br><br><br><br><br>
  <h3>heading to show adjacent sibling</h3>
  <p>Adjacent Sibling</p>
  <p>Not Adjacent</p>

 <br><br><br><br>
  <h4>showing higher sibling </h4>
  <p>General Sibling 1</p>
  <p>General Sibling 2</p>

</body>
</html>
